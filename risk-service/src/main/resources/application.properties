spring.application.name=risk-service
spring.kafka.bootstrap-servers=localhost:9092
server.port=8081

spring.kafka.consumer.group-id=risk-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.default.type=com.learning.risk_service.model.Trade
spring.kafka.consumer.properties.spring.json.trusted.packages=com.learning.risk_service
spring.kafka.consumer.properties.spring.json.use.type.headers=false